<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KoreaConnect - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: "0 1px 3px rgba(0,0,0,0.04)",
            modal: "0 4px 24px rgba(0,0,0,0.06)"
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class='bg-[#FAFAFA] min-h-screen flex items-center justify-center p-6'>

<div class="w-full max-w-[420px]">
  <div class="bg-white rounded-2xl border border-gray-200/80 p-8 shadow-modal">
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 bg-[#2563EB] rounded-xl flex items-center justify-center mb-4">
        <i data-lucide="globe" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="text-[22px] text-gray-900 mb-1 text-center" style="font-weight: 700;">Welcome to KoreaConnect</h1>
      <p class="text-[14px] text-gray-500 text-center">Join thousands of travelers sharing their Korea experiences.</p>
    </div>

    <button type="button" class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-gray-200 rounded-xl text-[15px] text-gray-700 hover:bg-gray-50 hover:border-gray-300 cursor-pointer transition-all bg-white" style="font-weight: 500;">
      <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"></path>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
      </svg>
      Continue with Google
    </button>

    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-[12px] text-gray-400" style="font-weight: 500;">or</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <div class="space-y-3">
      <input type="email" placeholder="Email address" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-[14px] text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-[#2563EB] focus:ring-2 focus:ring-blue-100 transition-all bg-white" />
      <button type="button" class="w-full py-3 bg-gray-900 text-white rounded-xl text-[14px] hover:bg-gray-800 cursor-pointer transition-colors" style="font-weight: 500;">
        Continue with Email
      </button>
    </div>

    <p class="text-[12px] text-gray-400 text-center mt-6 leading-relaxed">
      By continuing, you agree to our
      <a href="#" class="text-gray-600 underline">Terms of Service</a>
      and
      <a href="#" class="text-gray-600 underline">Privacy Policy</a>.
    </p>
  </div>

  <div class="text-center mt-6">
    <a href="index.html" class="inline-flex items-center gap-1.5 text-[13px] text-gray-500 no-underline hover:text-gray-700 transition-colors" style="font-weight: 500;">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Community
    </a>
  </div>
</div>

<script>
  lucide.createIcons();
  document.querySelectorAll("form[data-static-form='true']").forEach(function(form) {
    form.addEventListener("submit", function(e) { e.preventDefault(); });
  });
  
</script>
</body>
</html>
